services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-domains}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-domains}
      POSTGRES_DB: ${POSTGRES_DB:-domains}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-domains}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-domains}:${POSTGRES_PASSWORD:-domains}@postgres:5432/${POSTGRES_DB:-domains}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "run", "api"]

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-domains}:${POSTGRES_PASSWORD:-domains}@postgres:5432/${POSTGRES_DB:-domains}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "run", "worker"]

  scheduler:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-domains}:${POSTGRES_PASSWORD:-domains}@postgres:5432/${POSTGRES_DB:-domains}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "run", "scheduler"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # Basic Auth credentials for the panel (UI + API).
      PANEL_USER: ${PANEL_USER:-admin}
      PANEL_PASSWORD: ${PANEL_PASSWORD:-}
    ports:
      # FRONTEND_BIND=127.0.0.1 (default) = localhost only (SSH tunnel).
      # Set FRONTEND_BIND=0.0.0.0 to expose it by IP — Basic Auth protects it.
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
