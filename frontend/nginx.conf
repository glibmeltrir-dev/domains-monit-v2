server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # HTTP Basic Auth protects the whole panel (UI + API). Credentials are
  # generated at container start from PANEL_USER / PANEL_PASSWORD.
  auth_basic "DomainOps";
  auth_basic_user_file /etc/nginx/.htpasswd;

  # Health check stays open (no auth) so uptime probes / curl work.
  location = /api/health {
    auth_basic off;
    proxy_pass http://api:3000/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # Proxy API requests to the backend service.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
